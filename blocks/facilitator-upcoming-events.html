<!DOCTYPE html>
<html lang="en" wp-template>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Facilitator Upcoming Events Block • Tenda 21</title>
        <link href="../tailwind_theme/tailwind.css" rel="stylesheet" type="text/css">
    </head>
    <body class="bg-mist-100">
        <!--
            Block root: facilitator-upcoming-events
            Displays upcoming Events connected to the current Facilitator.

            NOTE — custom.php helper required (lightest possible):
            The event_facilitators field is a relationship field (not a taxonomy).
            Pinegrow's native loop cannot query "Events where event_facilitators contains current post ID."
            A single function in custom.php is needed:

            add_filter('pg_query_args', function($args, $block_id) {
                if ($block_id === 'facilitator-upcoming-events') {
                    $args['post_type'] = 'event';
                    $args['meta_query'] = [['key' => 'event_facilitators', 'value' => get_the_ID(), 'compare' => 'LIKE']];
                    $args['meta_key'] = 'event_start_date';
                    $args['orderby'] = 'meta_value';
                    $args['order'] = 'ASC';
                    $args['date_query'] = [['after' => 'today', 'inclusive' => true]];
                }
                return $args;
            }, 10, 2);

            Maps Event SCF fields: event_experience, event_start_date, event_start_time,
            event_end_date, event_end_time, event_location_type, event_location,
            event_price, event_booking_status, event_booking.
        -->
        <section class="py-24 px-6 bg-mist-100" cms-block="facilitator-upcoming-events" cms-block-category="tenda21_facilitator" cms-block-title="Facilitator Upcoming Events" cms-block-description="Upcoming Events connected to the current Facilitator via event_facilitators relationship field. Requires pg_query_args filter in custom.php.">
            <div class="max-w-6xl mx-auto w-full">
                <h2 class="font-sans uppercase text-[0.75rem] tracking-[0.15em] font-medium text-charcoal-600 mb-12" cms-block-field="section_heading" cms-block-field-type="content" cms-block-field-title="Section Heading">Upcoming Sessions</h2>
                <div class="space-y-8" cms-loop="facilitator-upcoming-events" cms-loop-description="Loop upcoming Events connected to the current Facilitator via event_facilitators relationship field.">
                    <!-- Event row — repeated by WordPress query loop -->
                    <article class="bg-bone-100 p-8 md:p-10 border-l-2 border-forest-700">
                        <div class="grid md:grid-cols-3 gap-8 items-start">
                            <div class="md:col-span-2 space-y-4">
                                <!-- Linked Experience title -->
                                <div>
                                    <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1" cms-block-field="event_label" cms-block-field-type="content" cms-block-field-title="Event Label">Event</span>
                                    <a href="#" class="font-serif font-light text-2xl md:text-3xl leading-[1.3] text-charcoal-900 hover:text-forest-800 transition-colors block">Event Title</a>
                                </div>
                                <!-- Date / Time -->
                                <div class="flex flex-wrap gap-x-10 gap-y-3 text-sm">
                                    <div>
                                        <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1" cms-block-field="start_label" cms-block-field-type="content" cms-block-field-title="Start Label">Start</span>
                                        <span class="font-sans text-charcoal-800">DD MMM YYYY</span>
                                        <span class="font-sans text-charcoal-600 ml-2">00:00</span>
                                    </div>
                                    <div>
                                        <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1" cms-block-field="end_label" cms-block-field-type="content" cms-block-field-title="End Label">End</span>
                                        <span class="font-sans text-charcoal-800">DD MMM YYYY</span>
                                        <span class="font-sans text-charcoal-600 ml-2">00:00</span>
                                    </div>
                                </div>
                                <!-- Location -->
                                <div class="flex gap-10 text-sm">
                                    <div>
                                        <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1" cms-block-field="format_label" cms-block-field-type="content" cms-block-field-title="Format Label">Format</span>
                                        <span class="font-sans text-charcoal-800">In-person</span>
                                    </div>
                                    <div>
                                        <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1" cms-block-field="location_label" cms-block-field-type="content" cms-block-field-title="Location Label">Location</span>
                                        <span class="font-sans text-charcoal-800">Tenda 21, Serra da Estrela</span>
                                    </div>
                                </div>
                            </div>
                            <!-- Price / Status / CTA column -->
                            <div class="space-y-5">
                                <div>
                                    <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1" cms-block-field="price_label" cms-block-field-type="content" cms-block-field-title="Price Label">Price</span>
                                    <span class="font-sans text-sm text-charcoal-800">€ —</span>
                                </div>
                                <div>
                                    <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1" cms-block-field="status_label" cms-block-field-type="content" cms-block-field-title="Status Label">Status</span>
                                    <span class="font-sans text-sm text-charcoal-800">Open</span>
                                </div>
                                <div class="pt-2">
                                    <a href="#" class="inline-block bg-clay-500 text-bone-50 font-sans font-medium text-xs uppercase tracking-[0.12em] px-8 py-3 transition-all duration-300 hover:bg-clay-600"> <span cms-block-field="cta_label" cms-block-field-type="content" cms-block-field-title="Button Label">Register</span> </a>
                                </div>
                            </div>
                        </div>
                    </article>
                </div>
                <p class="font-sans font-light text-base text-charcoal-600 mt-10 opacity-80" cms-block-field="empty_state_label" cms-block-field-type="content" cms-block-field-title="Empty State Message">No upcoming sessions for this facilitator yet.</p>
            </div>
        </section>
    </body>
</html>
