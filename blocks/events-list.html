<!DOCTYPE html>
<html lang="en" wp-template>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Events List Block • Tenda 21</title>
        <link href="../tailwind_theme/tailwind.css" rel="stylesheet" type="text/css">
        <style>:root { color-scheme: light; } body { font-family: "Work Sans", system-ui, sans-serif; font-weight: 300; }</style>
    </head>
    <body class="bg-bone-100">
        <!-- Block root: events-list
             Archive wrapper for the Events CPT loop.
             Owns the schedule label and timestamp text.
             The loop item must be the event-row block.
        -->
        <section class="py-16 md:py-24 px-6 bg-bone-100 border-t border-b border-mist-300" cms-block="events-list" cms-block-category="tenda21_event" cms-block-title="Events List" cms-block-description="Archive wrapper for the Events CPT loop. Provides schedule header and loop container. Loop id: events-schedule.">
            <div class="max-w-6xl mx-auto w-full">
                <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between border-b border-mist-400 pb-4 mb-10 text-xs font-sans uppercase tracking-[0.2em] text-charcoal-500">
                    <span cms-block-field="events_schedule_label" cms-block-field-type="content" cms-block-field-title="Schedule Label">Upcoming Schedule</span>
                    <span cms-block-field="events_timezone_label" cms-block-field-type="content" cms-block-field-title="Timezone Label">All times · Serra da Estrela, Portugal · GMT+1</span>
                </div>
                <div class="space-y-6" cms-loop="events-schedule" cms-loop-description="Loop all upcoming Events ordered by event_start_date ascending. Matches pg_query_args filter in custom.php. Each loop item renders the tenda21/event-row block.">
                    <!-- Loop item placeholder: drop the tenda21/event-row block inside this loop when assembling the archive template. -->
                    <div class="rounded border border-dashed border-mist-400/70 bg-bone-50/70 px-6 py-8 text-center font-sans text-sm text-charcoal-500/80">
                        Add the <strong>Event Row</strong> block inside the Events List loop.
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
