<!DOCTYPE html>
<html lang="en" wp-template>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Experience Card Block • Tenda 21</title>
        <link href="../tailwind_theme/tailwind.css" rel="stylesheet" type="text/css">
    </head>
    <body class="bg-bone-200">
        <!-- Block root: experience-card
             Archive card for the Experiences grid.
             Maps to SCF: experience_featured, experience_category_label, experience_short_description.
             experience_permalink (link) = post permalink — separate from title (string content field).
             title (content) = post title string only — never reuse the same field name for both link and content.
             No grid classes here — grid responsibility belongs to experiences-grid.
        -->
        <a href="#" cms-block="experience-card" cms-block-category="tenda21_experience" cms-block-title="Experience Card" cms-block-description="Archive card for a single Experience. Shows featured image, category label, title, and short description. Used inside the experiences-grid loop." cms-block-field="experience_permalink" cms-block-field-type="link" cms-block-field-title="Experience Link" class="group flex flex-col bg-bone-100/85 overflow-hidden shadow-[0_1px_0_rgba(42,41,38,0.04),0_1px_2px_rgba(42,41,38,0.06)] transition-all duration-500 hover:-translate-y-[2px] hover:shadow-[0_12px_32px_rgba(42,41,38,0.10)]">
            <div class="aspect-[4/3] bg-mist-200 bg-cover bg-center" cms-block-field="experience_featured" cms-block-field-type="background-image" cms-block-field-title="Featured Image"></div>
            <div class="p-6 space-y-2">
                <p class="font-sans uppercase text-[0.65rem] tracking-[0.15em] font-medium text-forest-700" cms-block-field="experience_category_label" cms-block-field-type="content" cms-block-field-title="Category Label">Category</p>
                <h2 class="font-serif font-light text-[1.6rem] leading-[1.25] tracking-[0.01em] text-charcoal-900 mb-3" cms-block-field="title" cms-block-field-type="content" cms-block-field-title="Experience Title">Experience Title</h2>
                <p class="font-sans text-sm leading-relaxed text-charcoal-600" cms-block-field="experience_short_description" cms-block-field-type="content" cms-block-field-title="Short Description">Short description of this experience.</p>
            </div>
        </a>
    </body>
</html>
