<!DOCTYPE html>
<html lang="en" wp-template>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Event Date Meta Block • Tenda 21</title>
        <link href="../tailwind_theme/tailwind.css" rel="stylesheet" type="text/css">
    </head>
    <body class="bg-bone-200">
        <!-- Block root: event-date-meta -->
        <!-- Displays stacked start/end date and time pulled from SCF fields -->
        <div class="flex flex-col gap-5 rounded-sm border border-mist-300 bg-bone-50/80 p-6" cms-block="event-date-meta" cms-block-category="tenda21_event" cms-block-title="Event Date Meta" cms-block-description="Start and end date/time cluster for an Event">
            <div class="space-y-2">
                <span class="font-sans uppercase text-[0.6rem] tracking-[0.3em] font-medium text-charcoal-500" cms-block-field="starts_label" cms-block-field-type="content" cms-block-field-title="Starts Label">Starts</span>
                <p class="font-serif text-4xl leading-tight text-charcoal-900">12 April 2024</p>
                <p class="font-sans text-sm uppercase tracking-[0.3em] text-charcoal-600">09:00</p>
            </div>
            <div class="h-px w-full bg-mist-300"></div>
            <div class="space-y-2">
                <span class="font-sans uppercase text-[0.6rem] tracking-[0.3em] font-medium text-charcoal-500" cms-block-field="ends_label" cms-block-field-type="content" cms-block-field-title="Ends Label">Ends</span>
                <p class="font-serif text-2xl leading-tight text-charcoal-800">14 April 2024</p>
                <p class="font-sans text-sm uppercase tracking-[0.3em] text-charcoal-600">14:00</p>
            </div>
            <p class="font-sans text-[0.6rem] uppercase tracking-[0.3em] text-charcoal-500" cms-block-field="timezone_label" cms-block-field-type="content" cms-block-field-title="Timezone Label">GMT+1 · Serra da Estrela</p>
        </div>
    </body>
</html>
