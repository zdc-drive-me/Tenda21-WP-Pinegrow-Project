<!DOCTYPE html>
<html lang="en" wp-template>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Facilitators Hero Block • Tenda 21</title>
        <link href="../tailwind_theme/tailwind.css" rel="stylesheet" type="text/css">
    </head>
    <body class="bg-bone-200">
        <!-- Block root: facilitators-hero
             Intro/title section for the Facilitators archive page.
             Contains page title and intro paragraph only.
             Does NOT contain the grid or loop — those belong to facilitators-grid.
        -->
        <section class="relative pt-40 pb-24 px-6 bg-bone-200" cms-block="facilitators-hero" cms-block-category="tenda21_facilitator" cms-block-title="Facilitators Hero" cms-block-description="Intro/title section for the Facilitators archive page. Contains page title and intro paragraph.">
            <div class="max-w-4xl mx-auto text-center w-full">
                <h1 class="font-serif font-light text-[clamp(2.5rem,6vw,4.5rem)] leading-[1.2] tracking-[0.02em] text-charcoal-900 mb-8" cms-block-field="title" cms-block-field-type="content" cms-block-field-title="Page Title">
                    Facilitators
                </h1>
                <p class="font-sans font-light text-lg md:text-xl leading-[1.8] text-charcoal-700 max-w-[65ch] mx-auto" cms-block-field="intro" cms-block-field-type="content" cms-block-field-control="richtext" cms-block-field-title="Intro Paragraph">
                    Each facilitator brings deep practice, embodied wisdom, and a genuine commitment to holding space for transformation. They are not teachers standing above—they are fellow travelers walking alongside.
                </p>
            </div>
        </section>
    </body>
</html>
