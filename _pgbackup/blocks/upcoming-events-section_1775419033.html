<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Upcoming Events Block • Tenda 21</title>
        <link href="../tailwind_theme/tailwind.css" rel="stylesheet" type="text/css">

    </head>
    <body class="bg-bone-200">
        <!-- Block root: experience-upcoming-events
             Upcoming Events tied to the current Experience (single Experience page).
             Loop id: 'upcoming-events' — matches pg_query_args filter in custom.php.
             Maps: title (WP post title), post_excerpt, event_start_date, event_start_time,
             event_price, event_booking_status, event_booking.
        -->
        <section class="py-24 px-6 bg-bone-200" cms-block="experience-upcoming-events" cms-block-title="Experience Upcoming Events" cms-block-description="Upcoming Events for the current Experience page. Loop id: upcoming-events. Requires pg_query_args filter in custom.php.">
            <div class="max-w-5xl mx-auto w-full">
                <h2 class="font-sans uppercase text-[0.75rem] tracking-[0.15em] font-medium text-charcoal-600 text-center mb-16">Upcoming Sessions</h2>
                <div class="space-y-6" cms-loop="upcoming-events" cms-loop-description="Loop upcoming Events linked to the current Experience, ordered by event_start_date ascending.">
                    <!-- Repeated by WordPress query loop for Events linked to this Experience -->
                    <article class="bg-bone-100 p-8 border-l-2 border-forest-700">
                        <div class="grid md:grid-cols-3 gap-8 items-start">
                            <div class="md:col-span-2 space-y-3">
                                <h3 class="font-serif font-light text-2xl leading-[1.3] text-charcoal-900" cms-block-field="title" cms-block-field-type="content" cms-block-field-title="Event Title">Event Title</h3>
                                <p class="font-sans font-light text-base leading-[1.8] text-charcoal-700" cms-block-field="post_excerpt" cms-block-field-type="content" cms-block-field-title="Event Excerpt">Short event excerpt.</p>
                                <div class="flex gap-8 text-sm">
                                    <div>
                                        <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1">Start Time</span>
                                        <span class="font-sans text-charcoal-800" cms-block-field="event_start_time" cms-block-field-type="content" cms-block-field-title="Start Time">00:00</span>
                                    </div>
                                    <div>
                                        <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1">Price</span>
                                        <span class="font-sans text-charcoal-800" cms-block-field="event_price" cms-block-field-type="content" cms-block-field-title="Price">€ —</span>
                                    </div>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-2">Start Date</span>
                                    <span class="font-sans text-sm text-charcoal-800" cms-block-field="event_start_date" cms-block-field-type="content" cms-block-field-title="Start Date">TBA</span>
                                </div>
                                <div>
                                    <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1">Booking Status</span>
                                    <span class="font-sans text-sm text-charcoal-800" cms-block-field="event_booking_status" cms-block-field-type="content" cms-block-field-title="Booking Status">Open</span>
                                </div>
                                <a href="#" cms-block-field="event_booking" cms-block-field-type="link" cms-block-field-title="Booking Link" class="inline-block bg-clay-500 text-bone-50 font-sans font-medium text-xs uppercase tracking-[0.12em] px-8 py-3 transition-all duration-300 hover:bg-clay-600">Book Now</a>
                            </div>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </body>
</html>
