<!DOCTYPE html>
<html lang="en" wp-template>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Experiences CTA Block • Tenda 21</title>
        <link href="../tailwind_theme/tailwind.css" rel="stylesheet" type="text/css">
    </head>
    <body class="bg-bone-100">
        <!-- Block root: experiences-cta
             Custom inquiry call-to-action for the Experiences archive page.
             Maps to SCF fields: experiences_cta_heading, experiences_cta_body,
             experiences_cta_label, experiences_cta_url.
        -->
        <section class="py-32 px-6 bg-bone-100" cms-block="experiences-cta" cms-block-category="tenda21_experience" cms-block-title="Experiences CTA" cms-block-description="Custom inquiry call-to-action for the Experiences archive page. Supports editable heading, body copy, button label, and button URL.">
            <div class="max-w-3xl mx-auto text-center w-full">
                <h2 class="font-serif font-light text-[clamp(1.75rem,4vw,3rem)] leading-[1.4] text-charcoal-800 mb-8" cms-block-field="experiences_cta_heading" cms-block-field-type="content" cms-block-field-title="Heading">Not sure which experience is right for you?</h2>
                <p class="font-sans font-light text-lg leading-[1.8] text-charcoal-700 mb-12 max-w-[65ch] mx-auto" cms-block-field="experiences_cta_body" cms-block-field-type="content" cms-block-field-title="Body Copy">We also offer custom immersions for groups and individuals with specific intentions. Reach out and let's create something together.</p>
                <a href="mailto:hello@tenda21.com?subject=Custom%20Experience%20Inquiry" cms-block-field="experiences_cta_url" cms-block-field-type="link" cms-block-field-title="CTA URL" cms-block-field-2="experiences_cta_label" cms-block-field-type-2="content" cms-block-field-title-2="CTA Label" class="inline-block bg-clay-500 text-bone-50 font-sans font-medium text-sm uppercase tracking-[0.12em] px-12 py-5 transition-all duration-300 hover:bg-clay-600 hover:[transform:translateY(-2px)] hover:shadow-[0_8px_24px_rgba(0,0,0,0.12)]">Inquire About Custom Retreats</a>
            </div>
        </section>
    </body>
</html>
