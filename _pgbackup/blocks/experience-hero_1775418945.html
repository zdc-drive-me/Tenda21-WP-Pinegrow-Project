<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Experience Hero Block • Tenda 21</title>
        <link href="../tailwind_theme/tailwind.css" rel="stylesheet" type="text/css">

    </head>
    <body class="bg-bone-200">
        <!-- Block root: experience-hero
             Hero section for a single Experience page.
             Maps to SCF fields: experience_subtitle, experience_intro,
             experience_duration_label, experience_format, experience_featured.
             The post title is pulled automatically by WordPress.
        -->
        <section class="relative pt-32 pb-16 px-6 bg-bone-200" cms-block="experience-hero" cms-block-title="Experience Hero" cms-block-description="Hero section for a single Experience page. Shows back link, title, subtitle, intro, duration, format, and featured image.">
            <div class="max-w-6xl mx-auto w-full">
                <a href="experiences.html" class="inline-block font-sans uppercase text-[0.65rem] tracking-[0.15em] font-medium text-forest-700 hover:text-forest-800 mb-8 transition-colors">← All Experiences</a>
                <div class="grid md:grid-cols-2 gap-12 items-start">
                    <div class="space-y-6">
                        <div class="space-y-3">
                            <h1 class="font-light text-[clamp(2.5rem,6vw,4.5rem)] leading-[1.2] tracking-[0.02em] text-charcoal-900" cms-block-field="title" cms-block-field-type="content" cms-block-field-title="Title">Experience Title</h1>
                            <p class="font-sans uppercase text-[0.75rem] tracking-[0.15em] font-medium text-forest-700" cms-block-field="experience_subtitle" cms-block-field-type="content" cms-block-field-title="Subtitle / Category">Category</p>
                        </div>
                        <p class="font-sans font-light text-xl leading-[1.8] text-charcoal-700" cms-block-field="experience_intro" cms-block-field-type="content" cms-block-field-control="richtext" cms-block-field-title="Intro Paragraph">Intro text for the experience.</p>
                        <div class="flex items-start gap-10 pt-2 border-t border-mist-400">
                            <div class="pt-6">
                                <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1">Duration</span>
                                <span class="font-sans text-sm text-charcoal-800" cms-block-field="experience_duration_label" cms-block-field-type="content" cms-block-field-title="Duration Label">Flexible</span>
                            </div>
                            <div class="pt-6">
                                <span class="font-sans uppercase text-[0.6rem] tracking-[0.12em] font-medium text-charcoal-600 block mb-1">Format</span>
                                <span class="font-sans text-sm text-charcoal-800" cms-block-field="experience_format" cms-block-field-type="content" cms-block-field-title="Format">Group &amp; Private</span>
                            </div>
                        </div>
                    </div>
                    <div class="aspect-[4/5] bg-mist-300 bg-cover bg-center sticky top-32" cms-block-field="experience_featured" cms-block-field-type="background-image" cms-block-field-title="Featured Image"></div>
                </div>
            </div>
        </section>
    </body>
</html>
