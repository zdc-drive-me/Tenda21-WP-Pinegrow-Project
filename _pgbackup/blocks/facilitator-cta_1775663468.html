<!DOCTYPE html>
<html lang="en" wp-template>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Facilitator CTA Block • Tenda 21</title>
        <link href="../tailwind_theme/tailwind.css" rel="stylesheet" type="text/css">
    </head>
    <body class="bg-bone-200">
        <!-- Block root: facilitator-cta
             "Are you a facilitator?" call-to-action section.
             Used at the bottom of the Facilitators page to invite collaborators.
        -->
        <section class="py-32 px-6 bg-bone-100" cms-block="facilitator-cta" cms-block-category="tenda21_facilitator" cms-block-title="Facilitator CTA" cms-block-description="Call-to-action section for the Facilitators page. Invites practitioners to get in touch via email.">
            <div class="max-w-3xl mx-auto text-center w-full">
                <h2 class="font-serif font-light text-[clamp(1.75rem,4vw,3rem)] leading-[1.4] text-charcoal-800 mb-8" cms-block-field="facilitator_cta_heading" cms-block-field-type="content" cms-block-field-title="Heading">
                    Are you a facilitator?
                </h2>
                <p class="font-sans font-light text-lg leading-[1.8] text-charcoal-700 mb-12 max-w-[65ch] mx-auto" cms-block-field="facilitator_cta_body" cms-block-field-type="content" cms-block-field-title="Body Text">
                    We're always open to collaborating with practitioners who share our values of presence, integrity, and deep respect for the process of transformation.
                </p>
                <a href="mailto:hello@tenda21.com?subject=Facilitator%20Collaboration" class="inline-block bg-charcoal-800 text-bone-50 font-sans font-medium text-sm uppercase tracking-[0.12em] px-12 py-5 transition-all duration-300 hover:bg-charcoal-900 hover:[transform:translateY(-2px)] hover:shadow-[0_8px_24px_rgba(0,0,0,0.12)]" cms-block-field="facilitator_cta_link" cms-block-field-type="link" cms-block-field-title="CTA Link">
                    Get in Touch
                </a>
            </div>
        </section>
    </body>
</html>
